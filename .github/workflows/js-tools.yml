name: JS Tools CI

on:
  push:
    paths:
      - "tools/prism_converter/**"
      - "tools/fetch_themes/**"
      - ".github/workflows/js-tools.yml"
  pull_request:
    paths:
      - "tools/prism_converter/**"
      - "tools/fetch_themes/**"
      - ".github/workflows/js-tools.yml"

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        tool:
          - prism_converter
          - fetch_themes

    defaults:
      run:
        working-directory: tools/${{ matrix.tool }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/${{ matrix.tool }}/package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        if: hashFiles(format('tools/{0}/test', matrix.tool)) != ''
        run: npm test
