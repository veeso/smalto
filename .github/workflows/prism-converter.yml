name: Prism Converter CI

on:
  push:
    paths:
      - "tools/prism_converter/**"
      - ".github/workflows/prism-converter.yml"
  pull_request:
    paths:
      - "tools/prism_converter/**"
      - ".github/workflows/prism-converter.yml"

defaults:
  run:
    working-directory: tools/prism_converter

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/prism_converter/package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
